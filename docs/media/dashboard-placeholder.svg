<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Nebula dashboard placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <style>
      .title { font: 700 36px sans-serif; fill: #f3f4f6; }
      .label { font: 600 16px sans-serif; fill: #d1d5db; }
      .hint { font: 500 14px sans-serif; fill: #9ca3af; }
      .panel { fill: #0f172a; stroke: #334155; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <text x="48" y="64" class="title">Nebula Dashboard Preview</text>
  <text x="48" y="92" class="hint">Replace this placeholder with an actual UI screenshot or GIF.</text>

  <rect x="48" y="122" width="320" height="240" class="panel" />
  <text x="70" y="154" class="label">Cluster Health</text>

  <rect x="390" y="122" width="762" height="360" class="panel" />
  <text x="414" y="154" class="label">Workflow Graph</text>

  <rect x="48" y="382" width="320" height="250" class="panel" />
  <text x="70" y="414" class="label">Node Logs</text>

  <rect x="390" y="502" width="762" height="130" class="panel" />
  <text x="414" y="534" class="label">Message Throughput</text>
</svg>
